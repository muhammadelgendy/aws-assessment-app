services:
  - type: web
    name: aws-assessment-app
    env: python
    plan: free
    rootDirectory: app
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port ${PORT}
    healthCheckPath: /
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
